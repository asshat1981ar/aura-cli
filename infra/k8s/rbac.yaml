apiVersion: v1
kind: ServiceAccount
metadata:
  name: aura
  namespace: aura
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aura
  namespace: aura
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aura
  namespace: aura
subjects:
  - kind: ServiceAccount
    name: aura
    namespace: aura
roleRef:
  kind: Role
  name: aura
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aura-api
  namespace: aura
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: aura-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aura-worker
  namespace: aura
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: aura-worker
