name: Release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-timeout
      - name: Run safe test suite
        env:
          AURA_SKIP_CHDIR: "1"
          AURA_TEST_MODE: "1"
        run: |
          python -m pytest \
            tests/test_auth.py \
            tests/test_jwt_hardening.py \
            tests/test_server_api.py \
            tests/test_cli_exit_codes.py \
            tests/test_sanitizer.py \
            tests/test_correlation.py \
            tests/test_config_schema.py \
            tests/test_redis_cache.py \
            tests/test_sandbox_violations.py \
            tests/test_sandbox_unit.py \
            tests/test_e2e_sandbox_retry.py \
            -v --timeout=30 --no-cov

  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges | head -50)
          else
            CHANGELOG=$(git log --oneline --no-merges "${PREV_TAG}..HEAD")
          fi
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        continue-on-error: true
      - name: Login to GHCR
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        continue-on-error: true
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Docker Image

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
