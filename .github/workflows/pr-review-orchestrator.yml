name: PR Review Orchestrator

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  synthesize:
    name: synthesize
    if: vars.AURA_GITHUB_AUTOMATION_ENABLED != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build synthesized PR review
        id: synth
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: python scripts/run_pr_review_orchestrator.py

      - name: Upsert synthesized review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- aura-pr-review -->";
            const body = fs.readFileSync("pr-review-comment.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Add step summary
        run: cat pr-review-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-orchestrator-${{ github.run_number }}
          path: |
            pr-review-summary.json
            pr-review-comment.md
          retention-days: 7

      - name: Enforce blocking verdict
        if: steps.synth.outputs.recommended_action == 'request_changes'
        run: |
          echo "Blocking verdict: ${{ steps.synth.outputs.recommended_action }}"
          exit 1
