version: '3.8'

services:
  api:
    image: ghcr.io/asshat1981ar/aura-cli:${VERSION:-1.0.0}
    restart: unless-stopped
    user: "1000:1000"
    read_only: false  # SQLite needs writes; only web container is read-only
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    mem_limit: 512m
    cpus: '1.0'
    environment:
      - AURA_ENV=production
      - AURA_LOG_LEVEL=info
      - AGENT_API_ENABLE_RUN=1
    env_file:
      - .env.n8n
    ports:
      - "8000:8000"
    volumes:
      - aura-memory:/app/memory
      - aura-logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "999:999"
    mem_limit: 256m
    cpus: '0.5'
    command: redis-server --appendonly yes --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    user: "101:101"
    mem_limit: 128m
    cpus: '0.5'
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  aura-memory:
  aura-logs:
  redis-data:
