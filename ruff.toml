# Ruff configuration for AURA CLI
# See https://docs.astral.sh/ruff/configuration/

exclude = [
    ".git",
    "__pycache__",
    "*.pyc",
    "archive",        # archived/dead code
    "aura-cli",       # stray subdirectory
    "plans",
    "conductor",
    "projects",
    ".pytest_cache",
    ".venv",
    "venv",
    "build",
    "dist",
]

# Use a generous line length to match existing codebase style
line-length = 300

[lint]
# Select meaningful rules including docstring enforcement (D) — Sprint 0 gate s0-ruff-docstring
select = ["E", "F", "W", "D"]

# Ignore intentional patterns used throughout this codebase
ignore = [
    "E402",   # module level import not at top of file (conditional imports are intentional)
    "E501",   # line too long (existing codebase has many long lines, especially in prompts)
    "E701",   # multiple statements on one line (colon — used intentionally in many places)
    "E702",   # multiple statements on one line (semicolon — used intentionally in many places)
    "E711",   # comparison to None (style preference)
    "E712",   # comparison to True/False (style preference)
    "E731",   # lambda assignment (existing pattern)
    "E741",   # ambiguous variable name (l, O, I — existing code uses these)
    "W291",   # trailing whitespace
    "W293",   # whitespace on blank lines inside indented blocks
    # ── D rules: module-level docstrings are noisy (as per task s0-ruff-docstring) ──
    "D100",   # Missing docstring in public module
    "D104",   # Missing docstring in public package
    # ── D rules: existing codebase has no docstrings yet — progressive adoption ──
    # TODO(s0-ruff-docstring): progressively remove these as docstrings are added
    "D101",   # Missing docstring in public class
    "D102",   # Missing docstring in public method
    "D103",   # Missing docstring in public function
    "D105",   # Missing docstring in magic method
    "D106",   # Missing docstring in public nested class
    "D107",   # Missing docstring in __init__
    # ── D rules: docstring formatting — suppress noisy style choices ──
    "D200",   # No whitespaces allowed surrounding docstring text
    "D202",   # No blank lines allowed after function docstring
    "D203",   # 1 blank line required before class docstring (conflicts with D211)
    "D204",   # 1 blank line required after class docstring
    "D205",   # 1 blank line required between summary line and description
    "D207",   # Docstring should not be over-indented
    "D209",   # Multi-line docstring closing quotes should be on a separate line
    "D211",   # No blank lines allowed before class docstring (use D211 not D203)
    "D212",   # Multi-line docstring summary should start at the first line
    "D213",   # Multi-line docstring summary should start at the second line
    "D301",   # Use r""" if any backslashes in a docstring
    "D400",   # First line should end with a period
    "D401",   # First line should be in imperative mood
    "D403",   # First word of the first line should be properly capitalized
    "D404",   # First word of the docstring should not be "This"
    "D413",   # Missing blank line after last section
    "D415",   # First line should end with a period, question mark, or exclamation point
    "D417",   # Missing argument descriptions in the docstring
]

# Per-file ignores for known intentional patterns
[lint.per-file-ignores]
# TUI uses conditional try/except imports for optional rich library
"aura_cli/tui/app.py" = ["F401", "E402"]
"aura_cli/tui/panels/cycle_panel.py" = ["F401"]
# cli_main.py is a backward-compat re-export hub; all its imports are
# intentionally surfaced as module attributes for external consumers and tests.
"aura_cli/cli_main.py" = ["F401"]
# Scripts are utility runners, relaxed rules
"scripts/*" = ["F401", "F841", "E402", "D"]
# Tests often import for side effects or future use; no docstring requirement
"tests/*" = ["F401", "F841", "D"]
"core/tests/*" = ["F401", "F841", "D"]
