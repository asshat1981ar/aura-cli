name: Nightly Fuzz
"on":
  schedule:
    - cron: '0 2 * * *'  # 2am UTC nightly
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - name: Run fuzz tests (extended)
        run: |
          pytest tests/security/fuzz_*.py tests/security/test_security_hardening.py \
            -v --hypothesis-seed=random \
            --tb=short
        env:
          HYPOTHESIS_PROFILE: thorough
