name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          # Only test 3.10 and 3.12 on macOS to save CI time
          - os: macos-latest
            python-version: "3.11"

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Test with pytest + coverage
      run: |
        pytest -q --maxfail=3 --cov=aura_cli --cov=core --cov=agents --cov=memory --cov-report=xml --cov-report=term-missing
    - name: Upload coverage
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: coverage-report
        path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
    - name: Set up Python 3.11
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
    - name: Ruff check
      run: ruff check .
    - name: Ruff format check
      run: ruff format --check .
      continue-on-error: true  # Advisory — existing codebase not yet fully formatted

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
    - name: Set up Python 3.11
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit[toml] pip-audit
        pip install -e ".[dev]"
    - name: Bandit security scan
      run: bandit -c pyproject.toml -r aura_cli/ core/ agents/ memory/ tools/ --skip B110,B404,B603
      continue-on-error: true  # Advisory — track but don't block on low-severity findings
    - name: Dependency audit
      run: pip-audit --strict --desc on
      continue-on-error: true  # Advisory — don't block PRs on upstream CVEs

  cli_docs_and_help_contracts:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
    - name: Set up Python 3.11
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.11"
    - name: Install minimal test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
    - name: Verify CLI docs are up to date
      run: |
        python scripts/generate_cli_reference.py --check
    - name: Verify CLI docs generator tests
      run: |
        pytest -q tests/test_cli_docs_generator.py
    - name: Verify CLI parser/dispatch contracts
      run: |
        pytest -q tests/test_cli_contract.py tests/test_cli_options.py
    - name: Verify CLI dispatch runtime contract subset
      run: |
        pytest -q tests/test_cli_main_dispatch.py -k "runtime_initialization_follows_action_contract_for_all_actions or dispatch_config_does_not_create_runtime or watch_and_studio_commands_have_runtime_and_ui_parity or watch_and_studio_autonomous_flag_is_forwarded_to_ui_run"
    - name: Verify CLI help/error snapshots
      run: |
        pytest -q tests/test_cli_help_snapshots.py tests/test_cli_error_snapshots.py
    - name: Verify CLI dispatch JSON snapshots
      run: |
        pytest -q tests/test_cli_main_dispatch.py -k snapshot

  package:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
    - name: Set up Python 3.11
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.11"
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip build
    - name: Build sdist and wheel
      run: python -m build
    - name: Verify package installs cleanly
      run: |
        pip install dist/*.whl
        aura --version
    - name: Upload build artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: dist
        path: dist/
