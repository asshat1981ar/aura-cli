apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aura-postgres
  namespace: aura
  labels:
    app: aura-postgres
spec:
  serviceName: aura-postgres
  replicas: 1
  selector:
    matchLabels:
      app: aura-postgres
  template:
    metadata:
      labels:
        app: aura-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "aura"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aura-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "aura"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - aura
                - -d
                - aura
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - aura
                - -d
                - aura
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aura-postgres
  namespace: aura
  labels:
    app: aura-postgres
spec:
  selector:
    app: aura-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  type: ClusterIP
