apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-worker
  namespace: aura
  labels:
    app: aura-worker
    version: v0.1.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aura-worker
  template:
    metadata:
      labels:
        app: aura-worker
        version: v0.1.0
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: aura-worker
          image: aura-cli:latest
          imagePullPolicy: Always
          command: ["/app/entrypoint.sh", "worker"]
          envFrom:
            - configMapRef:
                name: aura-worker-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aura-secrets
                  key: DATABASE_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aura-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aura-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: memory
              mountPath: /app/memory
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
        - name: memory
          emptyDir: {}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aura-worker-hpa
  namespace: aura
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aura-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
