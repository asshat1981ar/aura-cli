name: Issue Intake

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:
    inputs:
      issue_title:
        description: "Issue title"
        required: true
        type: string
      issue_body:
        description: "Issue body"
        required: false
        type: string
      issue_labels:
        description: "Comma-separated labels"
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  plan:
    name: plan
    if: vars.AURA_GITHUB_AUTOMATION_ENABLED != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build issue plan
        id: intake
        env:
          ISSUE_TITLE: ${{ github.event.inputs.issue_title || '' }}
          ISSUE_BODY: ${{ github.event.inputs.issue_body || '' }}
          ISSUE_LABELS: ${{ github.event.inputs.issue_labels || '' }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login || '' }}
        run: python scripts/run_issue_intake.py

      - name: Upsert issue plan comment
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          ISSUE_PLAN_LABELS_JSON: ${{ steps.intake.outputs.labels_json }}
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- aura-issue-plan -->";
            const body = fs.readFileSync("issue-plan-comment.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Add issue labels
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        env:
          ISSUE_PLAN_LABELS_JSON: ${{ steps.intake.outputs.labels_json }}
        with:
          script: |
            const labels = process.env.ISSUE_PLAN_LABELS_JSON ? JSON.parse(process.env.ISSUE_PLAN_LABELS_JSON) : [];
            if (!labels.length) {
              return;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels,
            });

      - name: Optionally queue issue for AURA
        if: github.event_name == 'issues' && vars.AURA_AUTO_QUEUE_ISSUES == '1' && steps.intake.outputs.should_queue == 'true'
        env:
          AURA_SKIP_CHDIR: "1"
          AURA_DRY_RUN: ${{ vars.AURA_ISSUE_QUEUE_DRY_RUN || '1' }}
          ISSUE_QUEUE_GOAL: ${{ steps.intake.outputs.queue_goal }}
        run: |
          python3 main.py --add-goal "$ISSUE_QUEUE_GOAL"

      - name: Upload issue intake artifacts
        uses: actions/upload-artifact@v4
        with:
          name: issue-intake-${{ github.run_number }}
          path: |
            issue-plan-summary.json
            issue-plan-comment.md
          retention-days: 7
