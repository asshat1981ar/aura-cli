apiVersion: v1
kind: Secret
metadata:
  name: aura-secrets
  namespace: aura
type: Opaque
stringData:
  # Database credentials - change in production!
  DATABASE_URL: "postgresql://aura:changeme@aura-postgres:5432/aura"
  POSTGRES_PASSWORD: "changeme"
  
  # API Keys - use external secret management in production
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GITHUB_TOKEN: ""
  
  # JWT Secret for OAuth2
  JWT_SECRET_KEY: "change-this-to-a-secure-random-string-in-production"
  
  # Encryption key for sensitive data
  AURA_ENCRYPTION_KEY: ""
