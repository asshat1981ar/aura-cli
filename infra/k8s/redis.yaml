apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-redis
  namespace: aura
  labels:
    app: aura-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aura-redis
  template:
    metadata:
      labels:
        app: aura-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: aura-redis
  namespace: aura
  labels:
    app: aura-redis
spec:
  selector:
    app: aura-redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  type: ClusterIP
