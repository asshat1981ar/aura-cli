# Production Docker Compose for AURA CLI
# Includes Redis, PostgreSQL, and monitoring

version: '3.8'

services:
  # Main AURA API Server
  aura-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.production
      target: production
    image: aura-cli:latest
    container_name: aura-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - AURA_ENV=production
      - AURA_ROLE=server
      - AURA_HOST=0.0.0.0
      - AURA_PORT=8000
      - AURA_WORKERS=2
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://aura:${POSTGRES_PASSWORD}@postgres:5432/aura
      - AURA_LOG_LEVEL=INFO
    env_file:
      - ../../.env
    volumes:
      - aura-memory:/app/memory
      - aura-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aura-network
    healthcheck:
      test: ["CMD", "/app/entrypoint.sh", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Background Task Worker
  aura-worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.production
      target: production
    image: aura-cli:latest
    container_name: aura-worker
    restart: unless-stopped
    environment:
      - AURA_ENV=production
      - AURA_ROLE=worker
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://aura:${POSTGRES_PASSWORD}@postgres:5432/aura
      - AURA_QUEUE=default
      - AURA_WORKER_CONCURRENCY=4
    env_file:
      - ../../.env
    volumes:
      - aura-memory:/app/memory
      - aura-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aura-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Task Scheduler
  aura-scheduler:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.production
      target: production
    image: aura-cli:latest
    container_name: aura-scheduler
    restart: unless-stopped
    environment:
      - AURA_ENV=production
      - AURA_ROLE=scheduler
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://aura:${POSTGRES_PASSWORD}@postgres:5432/aura
    env_file:
      - ../../.env
    volumes:
      - aura-memory:/app/memory
      - aura-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aura-network

  # Redis for caching and task queue
  redis:
    image: redis:7-alpine
    container_name: aura-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - aura-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # PostgreSQL for persistent storage
  postgres:
    image: postgres:16-alpine
    container_name: aura-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=aura
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=aura
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - aura-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura -d aura"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # Prometheus metrics exporter
  prometheus:
    image: prom/prometheus:latest
    container_name: aura-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - aura-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: aura-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - aura-network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}

volumes:
  aura-memory:
  aura-logs:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  aura-network:
    driver: bridge
