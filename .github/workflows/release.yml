name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      with:
        fetch-depth: 0  # Full history for changelog
    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.12"
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip build
    - name: Build sdist and wheel
      run: python -m build
    - name: Upload build artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: dist
        path: dist/

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.12"
    - name: Download build artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: dist
        path: dist/
    - name: Install and test built package
      run: |
        pip install dist/*.whl
        aura --version
        pip install pytest
        pytest -q --maxfail=3

  github-release:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      with:
        fetch-depth: 0
    - name: Download build artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: dist
        path: dist/
    - name: Generate changelog
      id: changelog
      run: |
        TAG="${GITHUB_REF_NAME}"
        # Extract the section for this tag from CHANGELOG.md if present
        if [ -f CHANGELOG.md ]; then
          # Strip leading 'v' so that v0.1.0 matches [0.1.0]
          VERSION="${TAG#v}"
          SECTION=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
        fi
        if [ -n "$SECTION" ]; then
          echo "$SECTION" > /tmp/changelog.md
        else
          # Fall back to git log since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" HEAD > /tmp/changelog.md
          else
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" > /tmp/changelog.md
          fi
        fi
    - name: Create GitHub Release
      uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2
      with:
        body_path: /tmp/changelog.md
        files: dist/*
        generate_release_notes: true

  publish-pypi:
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: dist
        path: dist/
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        # Uses trusted publishing (OIDC) — no API token needed
        # Configure at https://pypi.org/manage/project/aura-cli/settings/publishing/
        skip-existing: true
