minimum_pre_commit_version: "3.7.0"
default_stages: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: python
        additional_dependencies:
          - ruff==0.6.9
        types: [python]

      - id: ruff-format-check
        name: ruff format --check
        entry: ruff format --check
        language: python
        additional_dependencies:
          - ruff==0.6.9
        types: [python]

      - id: mypy
        name: mypy
        entry: mypy
        language: python
        additional_dependencies:
          - mypy==1.11.2
        args:
          - --ignore-missing-imports
          - --follow-imports=silent
        types: [python]

      - id: fast-tests
        name: fast tests
        entry: pytest -q tests/test_circuit_breaker.py tests/test_evolution_loop_rsi.py tests/test_beads_bridge.py tests/test_cli_main_dispatch.py
        language: system
        pass_filenames: false
        stages: [pre-push]
