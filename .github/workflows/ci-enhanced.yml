name: CI Enhanced — AURA CLI

"on":
  push:
    branches: [main, "release/**", "feature/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AURA_SKIP_CHDIR: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check . --output-format=github
      - name: Ruff format check
        run: ruff format . --check
      - name: Install project deps
        run: pip install -r requirements.txt --quiet
      - name: Verify CLI reference is current
        run: |
          python3 scripts/generate_cli_reference.py --check 2>/dev/null || \
          python3 scripts/generate_cli_reference.py && \
          git diff --exit-code docs/CLI_REFERENCE.md || \
          (echo "::error::CLI reference is stale — run: python3 scripts/generate_cli_reference.py" && exit 1)
        continue-on-error: true

  sast:
    name: SAST Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit
        run: bandit -r aura_cli core agents memory -c pyproject.toml --severity-level medium -f json -o bandit-results.json || true
      - name: Fail on high severity
        run: |
          python3 -c "
          import json, sys
          with open('bandit-results.json') as f:
              data = json.load(f)
          highs = [r for r in data.get('results', []) if r.get('issue_severity') == 'HIGH']
          if highs:
              for h in highs:
                  print(f'HIGH: {h[\"filename\"]}:{h[\"line_number\"]} - {h[\"issue_text\"]}')
              sys.exit(1)
          print(f'SAST OK: 0 HIGH severity findings ({len(data.get(\"results\", []))} total)')
          "
      - name: Upload SAST results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-results
          path: bandit-results.json

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install security tools
        run: pip install bandit[toml] pip-audit
      - name: Bandit SAST scan
        run: |
          bandit -r aura_cli/ core/ agents/ memory/ \
            -ll --format json --output bandit-report.json || true
          bandit -r aura_cli/ core/ agents/ memory/ -ll
        continue-on-error: true
      - name: pip-audit dependency CVE scan
        run: |
          pip install -r requirements.txt --quiet
          pip-audit --requirement requirements.txt --format json \
            --output pip-audit-report.json || true
          pip-audit --requirement requirements.txt --vulnerability-service pypi
        continue-on-error: true
      - name: Forbidden JWT pattern check
        run: |
          echo "=== Checking for algorithm='none' in production code ==="
          if grep -rn "algorithm.*['\"]none['\"]" \
            --include='*.py' \
            --exclude-dir=tests \
            --exclude-dir=.venv \
            aura_cli/ core/ agents/ memory/ 2>/dev/null; then
            echo "::error::Found algorithm='none' in production code — security vulnerability!"
            exit 1
          fi
          echo "✓ No forbidden JWT algorithm patterns found"
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 30

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout pytest-cov pytest-asyncio
      - name: Run safe targeted test suite
        timeout-minutes: 10
        env:
          AURA_TEST_MODE: "1"
        run: |
          python -m pytest \
            tests/test_auth.py \
            tests/test_jwt_hardening.py \
            tests/test_server_api.py \
            tests/test_cli_exit_codes.py \
            tests/test_sanitizer.py \
            tests/test_correlation.py \
            tests/test_config_schema.py \
            tests/test_redis_cache.py \
            tests/test_sandbox_violations.py \
            tests/test_sandbox_unit.py \
            tests/test_e2e_sandbox_retry.py \
            -v \
            --timeout=30 \
            --timeout-method=thread \
            --tb=short \
            --cov=aura_cli \
            --cov=core \
            --cov=agents \
            --cov=memory \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=15 \
            --junitxml=test-results.xml
      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-timeout
      - name: Run integration tests
        timeout-minutes: 5
        run: |
          if [ -d "tests/integration" ]; then
            python -m pytest tests/integration/ \
              -v --timeout=60 --no-cov -x || \
              echo "::warning::Some integration tests failed or directory is empty"
          else
            echo "No tests/integration/ directory found — skipping"
          fi

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aura-cli:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

  openapi-validate:
    name: OpenAPI Spec Validation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt --quiet
          pip install openapi-spec-validator --quiet
      - name: Export OpenAPI spec
        env:
          AURA_TEST_MODE: "1"
        run: python3 scripts/export_openapi.py
      - name: Validate OpenAPI spec
        run: |
          python3 -c "
          from openapi_spec_validator import validate
          from openapi_spec_validator.readers import read_from_filename
          spec, _ = read_from_filename('docs/api/openapi.json')
          validate(spec)
          print('OpenAPI spec is valid')
          "
      - name: Check spec is committed
        run: |
          git diff --exit-code docs/api/openapi.json || \
            (echo "::warning::OpenAPI spec is stale — run: python3 scripts/export_openapi.py" && true)
      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: docs/api/openapi.json
