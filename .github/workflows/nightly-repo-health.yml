name: Nightly Repo Health

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: nightly-repo-health
  cancel-in-progress: false

jobs:
  analyze:
    name: analyze
    if: vars.AURA_GITHUB_AUTOMATION_ENABLED != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch || 'main' }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Collect repo health input
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;

            const openPrs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 30,
            });

            const pullRequests = [];
            for (const pr of openPrs.slice(0, 20)) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });
              pullRequests.push({
                number: pr.number,
                title: pr.title || "",
                updated_at: pr.updated_at,
                draft: Boolean(pr.draft),
                labels: (pr.labels || []).map((label) => label.name).filter(Boolean),
                changed_files: files.map((file) => file.filename),
                author: pr.user?.login || "",
              });
            }

            const workflowRuns = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              per_page: 50,
            });

            const summarizedRuns = [];
            for (const run of workflowRuns.slice(0, 40)) {
              let failedJobs = [];
              const conclusion = (run.conclusion || "").toLowerCase();
              if (["failure", "timed_out", "cancelled", "startup_failure", "action_required"].includes(conclusion)) {
                const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                  owner,
                  repo,
                  run_id: run.id,
                  per_page: 100,
                });
                failedJobs = jobs
                  .filter((job) => {
                    const jobConclusion = (job.conclusion || "").toLowerCase();
                    return jobConclusion && !["success", "skipped", "neutral"].includes(jobConclusion);
                  })
                  .map((job) => job.name)
                  .filter(Boolean);
              }

              summarizedRuns.push({
                id: run.id,
                name: run.name || run.display_title || "workflow",
                conclusion,
                created_at: run.created_at,
                head_branch: run.head_branch || "",
                display_title: run.display_title || "",
                failed_jobs: failedJobs,
              });
            }

            fs.writeFileSync(
              "repo-health-input.json",
              JSON.stringify({ pull_requests: pullRequests, workflow_runs: summarizedRuns }, null, 2),
            );

      - name: Build repo health report
        id: report
        env:
          REPO_HEALTH_INPUT_PATH: repo-health-input.json
        run: python scripts/run_repo_health.py

      - name: Upsert repo health issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- aura-repo-health -->";
            const body = fs.readFileSync("repo-health-comment.md", "utf8");
            const title = "AURA Nightly Repo Health";
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => !issue.pull_request && issue.body && issue.body.includes(marker));
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["repo-health"],
              });
            }

      - name: Create or update follow-up issues
        uses: actions/github-script@v7
        with:
          script: |
            const core = require("@actions/core");
            const fs = require("fs");
            const followups = JSON.parse(fs.readFileSync("repo-health-followups.json", "utf8"));
            if (followups.length === 0) {
              core.notice("No recurring failure follow-up issues were recommended.");
              return;
            }

            const { owner, repo } = context.repo;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            for (const followup of followups) {
              const existing = openIssues.find(
                (issue) => !issue.pull_request && issue.body && issue.body.includes(followup.marker),
              );
              if (existing) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  title: followup.title,
                  body: followup.body,
                });
                continue;
              }

              await github.rest.issues.create({
                owner,
                repo,
                title: followup.title,
                body: followup.body,
                labels: followup.labels,
              });
            }

      - name: Add step summary
        run: cat repo-health-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload repo health artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-repo-health-${{ github.run_number }}
          path: |
            repo-health-input.json
            repo-health-summary.json
            repo-health-comment.md
            repo-health-followups.json
          retention-days: 7
