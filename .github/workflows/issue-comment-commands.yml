name: Issue Comment Commands

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  route:
    name: route
    if: vars.AURA_GITHUB_AUTOMATION_ENABLED != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Parse and route slash command
        id: route
        run: python scripts/run_issue_comment_command.py

      - name: Upsert command response
        if: steps.route.outputs.recognized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = `<!-- aura-command-response:${context.payload.comment.id} -->`;
            const body = fs.readFileSync("issue-command-comment.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Add labels from command routing
        if: steps.route.outputs.recognized == 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_COMMAND_LABELS_JSON: ${{ steps.route.outputs.labels_json }}
        with:
          script: |
            const labels = process.env.ISSUE_COMMAND_LABELS_JSON ? JSON.parse(process.env.ISSUE_COMMAND_LABELS_JSON) : [];
            if (!labels.length) {
              return;
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels,
            });

      - name: Optionally queue AURA goal
        if: steps.route.outputs.recognized == 'true' && steps.route.outputs.should_queue == 'true' && vars.AURA_AUTO_QUEUE_ISSUES == '1'
        env:
          AURA_SKIP_CHDIR: "1"
          AURA_DRY_RUN: ${{ vars.AURA_ISSUE_QUEUE_DRY_RUN || '1' }}
        run: |
          python3 main.py --add-goal "${{ steps.route.outputs.queue_goal }}"

      - name: Upload command routing artifacts
        if: steps.route.outputs.recognized == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: issue-command-${{ github.run_number }}
          path: |
            issue-command-summary.json
            issue-command-comment.md
          retention-days: 7
