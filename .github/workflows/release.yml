name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Quality gates: tests · lint · dependency audit
  # ──────────────────────────────────────────────────────────────────────────
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff pip-audit

      - name: Run full test suite
        run: python3 -m pytest

      - name: Ruff lint check
        run: ruff check .

      - name: Dependency vulnerability audit
        run: pip-audit

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build: sdist + wheel
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0   # setuptools-scm needs full history

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  # ──────────────────────────────────────────────────────────────────────────
  # 3. GitHub Release: extract changelog section → gh release create
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES_FILE="release_notes.md"

          if [ -f CHANGELOG.md ]; then
            # Try exact match on "## [<version>]" header
            SECTION=$(awk \
              "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
              CHANGELOG.md)
          fi

          if [ -n "$SECTION" ]; then
            printf '%s\n' "$SECTION" > "$NOTES_FILE"
          else
            # Fall back to git log since the previous tag
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" > "$NOTES_FILE"
            else
              git log --pretty=format:"- %s (%h)" HEAD > "$NOTES_FILE"
            fi
          fi

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "Release $GITHUB_REF_NAME" \
            --notes-file "${{ steps.notes.outputs.notes_file }}"
